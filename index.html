<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detay Periyodik Tablo</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050a0f;
  --surface: #0a1520;
  --border: #1a3a5c;
  --cyan: #00e5ff;
  --green: #00ff88;
  --red: #ff3355;
  --yellow: #ffd700;
  --blue: #4488ff;
  --text: #c8e0f0;
  --dim: #506070;

  --alkali: #e8720c;
  --toprak-alkali: #c49a44;
  --gecis: #7a8a9a;
  --ametal: #9b30e8;
  --soy-gaz: #1a3acc;
  --zayif-metal: #28b8b0;
  --yari-metal: #5599cc;
  --lantanit: #3db860;
  --aktinit: #88cc20;
  --radyoaktif: #88aa66;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Exo 2', sans-serif;
  min-height: 100vh;
  overflow-x: auto;
}

/* ── BAŞLIK ── */
header {
  text-align: center;
  padding: 20px 10px 10px;
  position: relative;
}
header h1 {
  font-family: 'Orbitron', monospace;
  font-size: clamp(18px, 3vw, 32px);
  font-weight: 900;
  letter-spacing: 0.15em;
  color: var(--cyan);
  text-shadow: 0 0 20px rgba(0,229,255,0.5), 0 0 40px rgba(0,229,255,0.2);
  text-transform: uppercase;
}
header p {
  font-family: 'Share Tech Mono', monospace;
  color: var(--dim);
  font-size: 12px;
  margin-top: 4px;
  letter-spacing: 0.2em;
}

/* ── LEGEND ── */
.legend {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px 14px;
  padding: 8px 20px;
  max-width: 1200px;
  margin: 0 auto;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.05em;
}
.legend-dot {
  width: 12px; height: 12px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ── PERİYODİK TABLO ── */
.table-wrapper {
  overflow-x: auto;
  padding: 4px 10px 20px;
}
.pt-grid {
  display: grid;
  grid-template-columns: 28px repeat(18, 54px);
  grid-template-rows: 24px repeat(10, 54px) 16px repeat(2, 54px);
  gap: 2px;
  min-width: 1020px;
  margin: 0 auto;
  width: fit-content;
}

/* Grup başlıkları */
.gh {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', monospace;
  font-size: 8px;
  color: var(--yellow);
  letter-spacing: 0.05em;
  line-height: 1.2;
  text-align: center;
}

/* Periyot numaraları */
.rh {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  color: var(--red);
  font-weight: 700;
}

/* Boşluk satırı */
.spacer-row { height: 16px; }

/* ── ELEMENT BUTONU ── */
.el-btn {
  position: relative;
  width: 54px; height: 54px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 3px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
  overflow: hidden;
  background-color: var(--el-bg, #1a2a3a);
}
.el-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
  pointer-events: none;
}
.el-btn:hover {
  transform: scale(1.12);
  z-index: 10;
  border-color: var(--el-glow, #fff);
  box-shadow: 0 0 12px var(--el-glow, #fff), 0 0 24px rgba(255,255,255,0.15);
}
.el-btn:active { transform: scale(0.96); }

.el-no {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.55);
  line-height: 1;
}
.el-sym {
  font-family: 'Orbitron', monospace;
  font-size: 17px;
  font-weight: 700;
  line-height: 1.1;
  color: var(--el-text, #fff);
}
.el-name {
  font-size: 7px;
  font-family: 'Exo 2', sans-serif;
  color: rgba(255,255,255,0.65);
  line-height: 1;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  max-width: 50px;
  text-overflow: ellipsis;
}

/* Lantanit / Aktinit ref butonları */
.ref-btn {
  background: linear-gradient(135deg, #0d1f10, #0a180d) !important;
  border-color: #1a4a20 !important;
  font-size: 8px;
  color: #5a9a60;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Share Tech Mono', monospace;
  border-radius: 3px;
  border: 1px solid #1a4a20;
  width: 54px; height: 54px;
  text-align: center;
  line-height: 1.3;
}

/* ── MODAL ── */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(2,8,14,0.92);
  z-index: 1000;
  backdrop-filter: blur(4px);
  overflow-y: auto;
  padding: 20px;
}
.modal-bg.open { display: flex; align-items: flex-start; justify-content: center; }

.modal {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--modal-color, var(--cyan));
  border-radius: 8px;
  width: 100%;
  max-width: 1000px;
  box-shadow: 0 0 40px var(--modal-color, var(--cyan)), 0 0 80px rgba(0,0,0,0.8);
  animation: modalIn 0.25s ease;
  overflow: hidden;
}
@keyframes modalIn {
  from { opacity:0; transform: scale(0.92) translateY(-20px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}

.modal-close {
  position: absolute;
  top: 14px; right: 16px;
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--dim);
  font-size: 20px;
  width: 34px; height: 34px;
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s, color 0.2s;
  z-index: 10;
  font-family: monospace;
}
.modal-close:hover { border-color: var(--red); color: var(--red); }

/* Modal üst başlık şeridi */
.modal-header {
  padding: 18px 60px 14px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 8px;
}
.mh-left, .mh-right {
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.mh-label {
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  color: var(--text);
  font-style: italic;
}
.mh-val {
  font-family: 'Orbitron', monospace;
  font-size: 20px;
  font-weight: 700;
  color: var(--green);
}

/* Modal body */
.modal-body {
  display: grid;
  grid-template-columns: 1fr 240px 1fr;
  gap: 16px;
  padding: 16px 24px;
  align-items: start;
}

/* Sol & Sağ kolonlar */
.col-data {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.data-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  justify-content: flex-end;
}
.data-row.right { justify-content: flex-start; }
.data-label {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  color: var(--text);
  font-style: italic;
  white-space: nowrap;
}
.data-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
}
.dv-cyan { color: var(--cyan); }
.dv-red  { color: var(--red); }

/* Merkez sembol */
.col-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.center-sub {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-style: italic;
  color: var(--dim);
  letter-spacing: 0.1em;
}
.symbol-wrap {
  border: 2px solid var(--modal-color, var(--cyan));
  border-radius: 6px;
  padding: 6px 14px;
  box-shadow: 0 0 16px var(--modal-color, var(--cyan));
}
.symbol-wrap.glow {
  box-shadow:
    0 0 8px var(--modal-color, var(--cyan)),
    0 0 20px var(--modal-color, var(--cyan)),
    0 0 40px rgba(0,0,0,0.3) inset;
}
.big-symbol {
  font-family: 'Orbitron', monospace;
  font-size: 96px;
  font-weight: 900;
  line-height: 1;
  color: var(--modal-color, var(--cyan));
  text-shadow: 0 0 20px var(--modal-color, var(--cyan));
}
.big-name {
  font-family: 'Orbitron', monospace;
  font-size: 20px;
  font-weight: 700;
  color: var(--green);
  text-align: center;
  letter-spacing: 0.08em;
}

/* Modal alt bilgi alanı */
.modal-info {
  padding: 12px 24px;
  border-top: 1px solid rgba(255,255,255,0.07);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.info-block { text-align: center; }
.info-title {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  color: var(--text);
  font-style: italic;
  margin-bottom: 3px;
  letter-spacing: 0.08em;
}
.info-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  line-height: 1.5;
}

/* Resimler */
.modal-images {
  padding: 14px 24px 20px;
  border-top: 1px solid rgba(255,255,255,0.07);
}
.modal-images h3 {
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  color: var(--text);
  text-align: center;
  margin-bottom: 12px;
  letter-spacing: 0.1em;
}
.img-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}
.img-frame {
  flex: 1;
  min-width: 120px;
  max-width: 300px;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  background: #030c12;
}
.img-frame.spectrum { max-width: 100%; flex-basis: 100%; }
.img-frame img {
  width: 100%;
  display: block;
  height: auto;
}
.img-frame p {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--dim);
  text-align: center;
  padding: 4px;
  letter-spacing: 0.1em;
}
.no-img {
  width: 100%;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--dim);
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
}

/* Tab navigasyon (resim başlıkları için) */
.img-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  justify-content: center;
}
.img-tab {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  padding: 4px 12px;
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  background: transparent;
  color: var(--dim);
  transition: 0.2s;
  letter-spacing: 0.05em;
}
.img-tab.active, .img-tab:hover {
  border-color: var(--modal-color, var(--cyan));
  color: var(--modal-color, var(--cyan));
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #050a0f; }
::-webkit-scrollbar-thumb { background: #1a3a5c; border-radius: 3px; }

/* Responsive */
@media (max-width: 700px) {
  .modal-body { grid-template-columns: 1fr; }
  .col-center { order: -1; }
  .data-row { justify-content: center !important; }
  .big-symbol { font-size: 72px; }
}
</style>
</head>

      <div class="col-data" id="mColRight"></div>
    </div>
    <div class="modal-info" id="mInfo"></div>
    <div class="modal-images" id="mImages"></div>
  </div>
</div>

function getColor(el) {
  const t = el.type;
  const n = el.no;
  const m = {
    'ALKALİ METAL':     {bg:'#c45f0a', text:'#fff', glow:'#ff8c30'},
    'TOPRAK ALKALİ METAL': {bg:'#8a6a20', text:'#fff', glow:'#c49a44'},
    'GEÇİŞ METALİ':    {bg:'#2d4455', text:'#b8d4e8', glow:'#6699bb'},
    'AMETAL':           {bg:'#4a1a7a', text:'#d8aaff', glow:'#aa55ff'},
    'SOY GAZ':          {bg:'#0a1a6a', text:'#8899ff', glow:'#3355ff'},
    'ZAYIF METAL':      {bg:'#0a4a45', text:'#80e8e0', glow:'#28b8b0'},
    'YARI METAL':       {bg:'#0a2a4a', text:'#7ab8ee', glow:'#4488cc'},
    'LANTANİT':         {bg:'#0a3a1a', text:'#80e880', glow:'#30b850'},
    'AKTİNİT':          {bg:'#1e3a04', text:'#b0e840', glow:'#78bb10'},
  };
  if (n > 103) return {bg:'#1a2a1a', text:'#99bb88', glow:'#66aa44'};
  return m[t] || {bg:'#1a2a3a', text:'#88aacc', glow:'#4477aa'};
}

// Özel sembol renkleri
function getSymbolColor(el) {
  const special = {
    15: '#ff5566', 29: '#ff7722', 35: '#ff4400',
    47: '#dddddd', 79: '#ffd700', 80: '#ff3333', 53: '#cc44ff'
  };
  return special[el.no] || getColor(el).glow;
}

const grupLabels = {1:'1A',2:'2A',3:'3B',4:'4B',5:'5B',6:'6B',7:'7B',8:'8B',9:'8B',10:'8B',11:'1B',12:'2B',13:'3A',14:'4A',15:'5A',16:'6A',17:'7A',18:'8A'};

function buildTable() {
  const grid = document.getElementById('ptGrid');

  // Satır 0: boş köşe + grup başlıkları
  const corner = document.createElement('div');
  grid.appendChild(corner);
  for (let g = 1; g <= 18; g++) {
    const gh = document.createElement('div');
    gh.className = 'gh';
    gh.innerHTML = `${grupLabels[g]}<br>(${g})`;
    grid.appendChild(gh);
  }

  // Grid hücre haritası: [row][col] = element
  const cells = {};
  const lantArr = [], actArr = [];

  elementler.forEach(el => {
    let r = el.period, c = el.group;
    if (el.no >= 57 && el.no <= 71) { lantArr.push(el); return; }
    if (el.no >= 89 && el.no <= 103) { actArr.push(el); return; }
    if (!cells[r]) cells[r] = {};
    cells[r][c] = el;
  });

  // Satırlar 1-7 (normal periyotlar)
  for (let r = 1; r <= 7; r++) {
    // Periyot no
    const rh = document.createElement('div');
    rh.className = 'rh';
    rh.textContent = r;
    grid.appendChild(rh);

    for (let c = 1; c <= 18; c++) {
      const el = cells[r] && cells[r][c];

      // Lantanit/Aktinit yer tutucu
      if (r === 6 && c === 3) {
        const ref = document.createElement('div');
        ref.className = 'ref-btn';
        ref.innerHTML = '57–71<br>LANTANİT';
        grid.appendChild(ref);
        continue;
      }
      if (r === 7 && c === 3) {
        const ref = document.createElement('div');
        ref.className = 'ref-btn';
        ref.innerHTML = '89–103<br>AKTİNİT';
        grid.appendChild(ref);
        continue;
      }

      if (el) {
        grid.appendChild(makeBtn(el));
      } else {
        const empty = document.createElement('div');
        grid.appendChild(empty);
      }
    }
  }

  // Boşluk satırı
  const spacer = document.createElement('div');
  spacer.style.cssText = 'grid-column: 1 / -1; height: 16px;';
  grid.appendChild(spacer);

  // Lantanitler (satır 9 → görsel satır)
  addFBlock(grid, 'LANTANİTLER  57 → 71', lantArr);

  // Aktinitler (satır 10)
  addFBlock(grid, 'AKTİNİTLER  89 → 103', actArr);
}

function addFBlock(grid, label, arr) {
  // Etiket sütunu
  const lbl = document.createElement('div');
  lbl.style.cssText = 'display:flex;align-items:center;justify-content:flex-end;padding-right:6px;';
  lbl.innerHTML = `<span style="font-family:Share Tech Mono,monospace;font-size:8px;color:#506070;writing-mode:horizontal-tb;white-space:nowrap;">${label}</span>`;
  grid.appendChild(lbl);

  // Boş kolon 1
  const e1 = document.createElement('div'); grid.appendChild(e1);
  const e2 = document.createElement('div'); grid.appendChild(e2);

  // Elementler (kolon 4-18 → 15 element)
  arr.forEach(el => grid.appendChild(makeBtn(el)));

  // Kalan boş hücreler
  const rem = 18 - arr.length - 2;
  for (let i = 0; i < rem; i++) {
    const e = document.createElement('div'); grid.appendChild(e);
  }
}

function makeBtn(el) {
  const {bg, text, glow} = getColor(el);
  
  // İstisna Elementler: Bu atom numaralarına sahip olanlar parlayacak
  const specialGlowIds = [15, 17, 29, 35, 53, 79, 80, 92];
  
  const btn = document.createElement('div');
  btn.className = 'el-btn';
  btn.style.setProperty('--el-bg', bg);
  btn.style.setProperty('--el-text', text);
  btn.style.setProperty('--el-glow', glow);
  btn.title = el.name;

  // 1. ÖZEL PARLAMA (İstisna Element Kontrolü)
  // Verideki no string olsa bile Number() ile sayıya çevirip kontrol ediyoruz
  if (specialGlowIds.includes(Number(el.no))) {
    btn.style.border = `2px solid ${glow}`;
    btn.style.boxShadow = `inset 0 0 15px ${glow}, 0 0 15px ${glow}`;
    btn.style.zIndex = "10"; // Diğer kutuların biraz üzerinde görünmesi için
  }

  btn.innerHTML = `
    <span class="el-no">${el.no}</span>
    <span class="el-sym">${el.sym}</span>
    <span class="el-name">${el.name.split('/')[0]}</span>
  `;

  // 2. TIKLAMA OLAYI (Detay Sayfasını Açma)
  btn.addEventListener('click', () => {
    // Eğer fonksiyon isminiz openModal ise:
    if (typeof openModal === "function") {
        openModal(el);
    } 
    // Eğer fonksiyon isminiz showDetail ise (bazı dosyalarınızda böyleydi):
    else if (typeof showDetail === "function") {
        showDetail(el);
    }
  });

  return btn;
}

function openModal(el) {
  const {glow} = getColor(el);
  const symColor = getSymbolColor(el);

  // Modal rengini ayarla
  document.getElementById('modal').style.setProperty('--modal-color', glow);
  document.getElementById('mSymWrap').style.setProperty('--modal-color', glow);
  document.getElementById('mSymWrap').style.borderColor = glow;
  document.getElementById('mSymWrap').style.boxShadow = `0 0 20px ${glow}`;
  document.getElementById('modal').style.borderColor = glow;
  document.getElementById('modal').style.boxShadow = `0 0 40px ${glow}50, 0 0 80px rgba(0,0,0,.8)`;

  // Parlama efekti
  const isGlow = ['P','Br','Au','Hg','I','Cu'].includes(el.sym) || el.no > 82;
  document.getElementById('mSymWrap').className = 'symbol-wrap' + (isGlow ? ' glow' : '');

  // Başlık
  document.getElementById('mAtomNo').textContent = el.no;
  document.getElementById('mKutle').textContent = el.mass;

  // Sembol ve ad
  document.getElementById('mSymbol').textContent = el.sym;
  document.getElementById('mSymbol').style.color = symColor;
  document.getElementById('mSymbol').style.textShadow = `0 0 20px ${symColor}`;
  document.getElementById('mName').textContent = el.name;

  // Sol kolon
  const leftData = [
    ['KAYN. NOK. (°C)', el.kayn],
    ['ERİM. NOK. (°C)', el.erim],
    ['YOĞUNLUK (g/cm³)', el.yogunluk],
    ['PERİYOT NO', el.periyot_no],
    ['GRUP NO', el.grup_no],
    ['BLOK', el.blok],
    ['CAS NO', el.cas],
    ['GRUP ADI', el.grup_adi],
  ];
  const leftCol = document.getElementById('mColLeft');
  leftCol.innerHTML = '';
  leftData.forEach(([label, val]) => {
    const row = document.createElement('div');
    row.className = 'data-row';
    row.innerHTML = `<span class="data-label">${label}</span><span class="data-val dv-cyan">${val ?? '—'}</span>`;
    leftCol.appendChild(row);
  });

  // Sağ kolon
  const rightData = [
    [el.yukseltgenme, 'YÜKS. BASAMAĞI'],
    [el.elek_ilg || '—', 'EL. İLGİSİ (kJ/mol)'],
    [el.elektroneg || '—', 'ELEKTRONEGATİFLİK'],
    [el.iyon_en, 'İYONLAŞMA EN. (kJ/mol)'],
    [el.hal, 'FİZİKSEL HAL'],
    [el.atom_yaricap, 'ATOM YARIÇAPİ (pm)'],

    [el.kristal, 'KRİSTAL YAPI'],
    [el.manyetik, 'MANYETİZMA'],
  ];
  const rightCol = document.getElementById('mColRight');
  rightCol.innerHTML = '';
  rightData.forEach(([val, label]) => {
    const row = document.createElement('div');
    row.className = 'data-row right';
    row.innerHTML = `<span class="data-val dv-red">${val ?? '—'}</span><span class="data-label">&nbsp;${label}</span>`;
    rightCol.appendChild(row);
  });

  // Bilgi alanı
  const infoArea = document.getElementById('mInfo');
  infoArea.innerHTML = `
    <div class="info-block">
      <div class="info-title">ELEKTRON DİZİLİMİ</div>
      <div class="info-val" style="color:var(--cyan)">${el.elektron_diz}</div>

    <div class="info-block">
      <div class="info-title">ELEMENTİN KEŞFİ</div>

    </div>
    <div class="info-block">
      <div class="info-title">ADININ KAYNAĞI</div>
      <div class="info-val" style="color:var(--green)">${el.ad_kaynak}</div>
    </div>
    <div class="info-block">
      <div class="info-title">FİZİKSEL GÖRÜNÜŞÜ</div>
      <div class="info-val" style="color:#ffaa44">${el.gorunum}</div>
    </div>
  `;

  // Resimler
  buildImages(el);

  document.getElementById('modalBg').classList.add('open');
  document.getElementById('modalBg').scrollTop = 0;
}

function buildImages(el) {
  const imgs = imgMap[el.no] || {};
  const container = document.getElementById('mImages');

  const hasMain = imgs.main;
  const hasAlt = imgs.alt;
  const hasSpec = imgs.spec;

  if (!hasMain && !hasAlt && !hasSpec) {
    container.innerHTML = '<p style="text-align:center;color:#506070;font-family:Share Tech Mono,monospace;font-size:11px;padding:12px;">Bu element için görsel mevcut değil</p>';
    return;
  }

  container.innerHTML = `
    <h3>ELEMENT FOTOĞRAFLARI & SPEKTRUM</h3>
    <div class="img-row" id="imgRowMain">
      ${hasMain ? `<div class="img-frame"><img src="resimler/${imgs.main}" alt="${el.name}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=no-img>Görsel Yok</div>'" /><p>ELEMENT GÖRSELİ</p></div>` : ''}
      ${hasAlt ? `<div class="img-frame"><img src="resimler/${imgs.alt}" alt="${el.name} alternatif" loading="lazy" onerror="this.parentNode.innerHTML='<div class=no-img>Görsel Yok</div>'" /><p>ALTERNATİF GÖRSEL</p></div>` : ''}
    </div>
    ${hasSpec ? `<div class="img-row" style="margin-top:10px"><div class="img-frame spectrum"><img src="resimler/${imgs.spec}" alt="${el.name} spektrum" loading="lazy" onerror="this.parentNode.innerHTML='<div class=no-img>Spektrum Görseli Yok</div>'" /><p>SPEKTRUM GÖRÜNTÜSÜ</p></div></div>` : ''}
  `;
}

function closeModal(e) {
  if (e.target === document.getElementById('modalBg')) {
    document.getElementById('modalBg').classList.remove('open');
  }
}
function closeModalBtn() {

document.addEventListener('keydown', e => {
